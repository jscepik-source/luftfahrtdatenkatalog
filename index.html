<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIP Welt-Katalog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }

        header { background: #003366; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 1.6rem; }
        header p  { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
        .header-links { display: flex; gap: 8px; flex-wrap: wrap; }
        .header-link {
            display: inline-block; padding: 6px 12px; font-size: 0.8rem;
            background: rgba(255,255,255,0.15); color: white; text-decoration: none;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); white-space: nowrap;
        }
        .header-link:hover { background: rgba(255,255,255,0.3); }

        .container { max-width: 960px; margin: 30px auto; padding: 0 20px; }

        #suche {
            width: 100%; padding: 12px 16px; font-size: 1rem;
            border: 1px solid #ccc; border-radius: 6px; margin-bottom: 16px;
        }

        #zaehler { font-size: 0.85rem; color: #666; margin-bottom: 16px; }

        .flughafen {
            background: white; border-radius: 8px; margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); overflow: hidden;
        }

        .fh-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; cursor: pointer; background: white;
            border: none; width: 100%; text-align: left; gap: 10px;
        }
        .fh-header:hover { background: #f0f4ff; }

        .fh-name { font-weight: bold; font-size: 1rem; flex: 1; }

        .fh-badge {
            font-size: 0.78rem; background: #003366; color: white;
            padding: 3px 10px; border-radius: 20px; white-space: nowrap;
        }

        .fh-inhalt { display: none; border-top: 1px solid #eee; padding: 14px 18px; }
        .fh-inhalt.offen { display: block; }

        .dfs-btn {
            display: inline-block; margin-bottom: 12px; padding: 8px 14px;
            background: #003366; color: white; text-decoration: none;
            border-radius: 5px; font-size: 0.85rem;
        }
        .dfs-btn:hover { background: #0055aa; }

        .karten-liste a {
            display: block; padding: 7px 0; color: #003366;
            text-decoration: none; font-size: 0.9rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .karten-liste a:last-child { border-bottom: none; }
        .karten-liste a:hover { text-decoration: underline; }

        .keine-karten { font-size: 0.85rem; color: #999; }

        #laden { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>AIP Welt-Katalog</h1>
        <p>Aktuelle Karten aus über 70 nationalen AIP-Quellen — wird automatisch alle 6 Stunden aktualisiert</p>
    </div>
    <div class="header-links" id="webtrak-box" style="display:none">
        <a class="header-link" href="https://www.airservicesaustralia.com/community/environment/aircraft-noise/webtrak/" target="_blank">🛩 WebTrak Australien</a>
    </div>
</header>

<div class="container">
    <input type="text" id="suche" placeholder="Flughafen suchen (z.B. EDDF, HCMM, LATI, VTBS ...)">
    <div id="zaehler"></div>
    <div id="liste"><div id="laden">Daten werden geladen...</div></div>
</div>

<script>
    const BASE = 'https://raw.githubusercontent.com/jscepik-source/dfs-katalog/main/';
    const KATALOG_FILES = [
        'dfs_katalog_export.json',
        'faa_katalog_export.json',
        'lo_katalog_export.json', 'ls_katalog_export.json', 'lk_katalog_export.json',
        'lz_katalog_export.json', 'lh_katalog_export.json', 'lr_katalog_export.json',
        'lb_katalog_export.json', 'lj_katalog_export.json', 'ld_katalog_export.json',
        'li_katalog_export.json', 'le_katalog_export.json', 'lp_katalog_export.json',
        'lg_katalog_export.json', 'lt_katalog_export.json', 'lf_katalog_export.json',
        'la_katalog_export.json', 'ud_katalog_export.json', 'lq_katalog_export.json',
        'lu_katalog_export.json', 'ly_katalog_export.json', 'lc_katalog_export.json',
        'eg_katalog_export.json', 'ei_katalog_export.json', 'ek_katalog_export.json',
        'ef_katalog_export.json', 'es_katalog_export.json', 'en_katalog_export.json',
        'eb_katalog_export.json', 'eh_katalog_export.json', 'ep_katalog_export.json',
        'ee_katalog_export.json', 'ev_katalog_export.json', 'ey_katalog_export.json',
        'bi_katalog_export.json',
        'om_katalog_export.json', 'oj_katalog_export.json', 'ob_katalog_export.json',
        'll_katalog_export.json', 'ot_katalog_export.json', 'oo_katalog_export.json',
        'oe_katalog_export.json', 'he_katalog_export.json',
        'hk_katalog_export.json', 'gm_katalog_export.json', 'fa_katalog_export.json',
        'hc_katalog_export.json', 'asecna_katalog_export.json',
        'rj_katalog_export.json', 'rk_katalog_export.json', 'ws_katalog_export.json',
        'vt_katalog_export.json', 'vh_katalog_export.json', 'vi_katalog_export.json',
        'wi_katalog_export.json', 'wm_katalog_export.json', 'rp_katalog_export.json',
        'vc_katalog_export.json', 'rc_katalog_export.json', 'vv_katalog_export.json',
        'vm_katalog_export.json', 'zb_katalog_export.json',
        'c_katalog_export.json',
        'sa_katalog_export.json', 'sb_katalog_export.json', 'sc_katalog_export.json',
        'se_katalog_export.json', 'sk_katalog_export.json', 'mu_katalog_export.json',
        'mm_katalog_export.json', 'sp_katalog_export.json', 'su_katalog_export.json',
        'sv_katalog_export.json',
        'y_katalog_export.json', 'nz_katalog_export.json',
        'u_katalog_export.json',
    ];

    let katalogDaten = {};

    Promise.allSettled(
        KATALOG_FILES.map(f =>
            fetch(BASE + f).then(r => r.ok ? r.json() : {}).catch(() => ({}))
        )
    ).then(results => {
        results.forEach(r => {
            if (r.status === 'fulfilled') Object.assign(katalogDaten, r.value);
        });
        zeige(katalogDaten);
    });

    function zeige(data) {
        const liste = document.getElementById('liste');
        const eintraege = Object.entries(data);
        const hatAustralien = eintraege.some(([n]) => n.toUpperCase().startsWith('Y'));
        document.getElementById('webtrak-box').style.display = hatAustralien ? '' : 'none';
        document.getElementById('zaehler').textContent = `${eintraege.length} Flughäfen`;

        if (eintraege.length === 0) {
            liste.innerHTML = '<p style="color:#999;padding:20px">Keine Ergebnisse.</p>';
            return;
        }

        liste.innerHTML = eintraege.map(([name, inhalt]) => {
            const url     = inhalt._url   || inhalt;
            const karten  = inhalt.karten || {};
            const liste_k = Object.entries(karten);

            const kartenHTML = liste_k.length > 0
                ? `<div class="karten-liste">${liste_k.map(([k, u]) =>
                    `<a href="${u}" target="_blank">${k}</a>`).join('')}</div>`
                : '<span class="keine-karten">Keine Einzelkarten gefunden</span>';

            return `
            <div class="flughafen">
                <button class="fh-header" onclick="toggle(this)">
                    <span class="fh-name">${name}</span>
                    <span class="fh-badge">${liste_k.length} Karten</span>
                </button>
                <div class="fh-inhalt">
                    <a class="dfs-btn" href="${url}" target="_blank">Aktuelle Karten auf DFS öffnen ↗</a>
                    ${kartenHTML}
                </div>
            </div>`;
        }).join('');
    }

    function toggle(btn) {
        btn.nextElementSibling.classList.toggle('offen');
    }

    document.getElementById('suche').addEventListener('input', function () {
        const q = this.value.toLowerCase();
        zeige(Object.fromEntries(
            Object.entries(katalogDaten).filter(([n]) => n.toLowerCase().includes(q))
        ));
    });
</script>
</body>
</html>
