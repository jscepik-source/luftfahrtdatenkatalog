name: DFS Katalog aktualisieren

on:
  schedule:
    - cron: '0 */6 * * *'  # Alle 6 Stunden
  workflow_dispatch:        # Auch manuell startbar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Python einrichten
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install selenium requests beautifulsoup4

      - name: Chrome installieren
        uses: browser-actions/setup-chrome@v1

      - name: Flughafen-Bot ausführen
        run: python dfs_bot.py

      - name: NOTAM-PDF-Bot ausführen
        run: python notam_bot.py

      - name: NfL-Liste-Bot ausführen
        run: python nfl_bot.py

      - name: Dateien committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dfs_katalog_export.json notam_info.json nfl_katalog.json
          git diff --staged --quiet || git commit -m "Katalog, NOTAM und NfL automatisch aktualisiert"
          git push
