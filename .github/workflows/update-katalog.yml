name: DFS Katalog aktualisieren

on:
  schedule:
    - cron: '0 */6 * * *'  # Alle 6 Stunden
  workflow_dispatch:        # Auch manuell startbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Python einrichten
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install selenium webdriver-manager requests beautifulsoup4

      - name: Chrome installieren
        uses: browser-actions/setup-chrome@v1.7.2

      - name: Flughafen-Bot ausführen
        run: python dfs_bot.py

      - name: NOTAM-PDF-Bot ausführen
        run: python notam_bot.py

      - name: NfL-Liste-Bot ausführen
        run: python nfl_bot.py

      - name: NfL-NOTAMs-Bot ausführen
        run: python nfl_notams_bot.py

      - name: FAA-Karten-Bot ausführen
        run: python faa_bot.py

      - name: Südafrika-Bot ausführen
        run: python southafrica_bot.py
        continue-on-error: true

      - name: Belgien-Bot ausführen
        run: python belgium_bot.py
        continue-on-error: true

      - name: Austrocontrol-Bot ausführen
        run: python austrocontrol_bot.py
        continue-on-error: true

      - name: Japan-AIP-Bot ausführen
        run: python japan_bot.py
        continue-on-error: true

      - name: Welt-eAIP-Bot ausführen
        run: python eaip_bot.py
        continue-on-error: true

      - name: Dateien committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ourairports.html \
                  dfs_katalog_export.json notam_info.json nfl_katalog.json nfl_notams_export.json \
                  faa_katalog_export.json \
                  lo_katalog_export.json ls_katalog_export.json lk_katalog_export.json \
                  lz_katalog_export.json lh_katalog_export.json lr_katalog_export.json \
                  lb_katalog_export.json lj_katalog_export.json ld_katalog_export.json \
                  li_katalog_export.json le_katalog_export.json lp_katalog_export.json \
                  lg_katalog_export.json lt_katalog_export.json lf_katalog_export.json \
                  la_katalog_export.json ud_katalog_export.json lq_katalog_export.json \
                  lu_katalog_export.json ly_katalog_export.json lc_katalog_export.json \
                  eg_katalog_export.json ei_katalog_export.json ek_katalog_export.json \
                  ef_katalog_export.json es_katalog_export.json en_katalog_export.json \
                  eb_katalog_export.json eh_katalog_export.json ep_katalog_export.json \
                  ee_katalog_export.json ev_katalog_export.json ey_katalog_export.json \
                  bi_katalog_export.json \
                  om_katalog_export.json oj_katalog_export.json ob_katalog_export.json \
                  ll_katalog_export.json ot_katalog_export.json oo_katalog_export.json \
                  oe_katalog_export.json he_katalog_export.json \
                  hk_katalog_export.json gm_katalog_export.json fa_katalog_export.json \
                  asecna_katalog_export.json \
                  rj_katalog_export.json rk_katalog_export.json ws_katalog_export.json \
                  vt_katalog_export.json vh_katalog_export.json vi_katalog_export.json \
                  wi_katalog_export.json wm_katalog_export.json rp_katalog_export.json \
                  vc_katalog_export.json rc_katalog_export.json vv_katalog_export.json \
                  vm_katalog_export.json zb_katalog_export.json \
                  c_katalog_export.json sa_katalog_export.json sb_katalog_export.json \
                  sc_katalog_export.json se_katalog_export.json sk_katalog_export.json \
                  mu_katalog_export.json mm_katalog_export.json sp_katalog_export.json \
                  su_katalog_export.json sv_katalog_export.json \
                  y_katalog_export.json nz_katalog_export.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Kataloge, NOTAM, NfL und eAIP-Karten aktualisiert"
          git push
